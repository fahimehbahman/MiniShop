services:

  sqlserver :
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: minishop-sql # esme container 
    environment:
      MSSQL_SA_PASSWORD: ${SA_PASSWORD} 
      ACCEPT_EULA: "Y" # mige sharayet ro ghabol mikonam 
    ports:
      - "1433:1433"
   

  api:
      build:
        context: .
        dockerfile: MiniShop.Api/Dockerfile
      ports:
        - "5000:8080"
      depends_on:
        - sqlserver
      environment:
         ConnectionStrings__DefaultConnection: ${DB_CONNECTION}

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf # bad az : container address which created after create image of enginx
      - ./certs:/etc/nginx/certs
    depends_on:
      - api

  ui:
    build:
      context: ./minis-shop-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
        - nginx  
        